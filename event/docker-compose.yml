version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: events_db
    restart: always
    environment:
      MYSQL_DATABASE: events
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - event_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_manage_app
    restart: always
    ports:
      - "8081:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/events?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - event_network

volumes:
  mysql_data:

networks:
  event_network:
    driver: bridge
