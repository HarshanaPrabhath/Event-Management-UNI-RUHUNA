spring:
  application:
    name: event_manage

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/events?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: your_secret
    expiration-ms: 86400000
